services:
  dev-server:
    build:
      context: ./build
      args:
        DEV_USER: ${DEV_USER}
        DEV_USER_PASSWORD: ${DEV_USER_PASSWORD}
    container_name: ${DEV_SERVER_CONTAINER:-dev-server}
    init: true
    environment:
      - DEV_USER=${DEV_USER}
      - SSH_PORT=${SSH_PORT}
      - CODE_SERVER_PORT=${CODE_SERVER_PORT}
      - CODE_SERVER_PASSWORD=${DEV_USER_PASSWORD}
      # Docker CLI to the docker-builder DinD container (run ./scripts/docker-builder-start.sh first)
      - DOCKER_HOST=tcp://docker-builder:2375
      # Openclaw
      # - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      # - OPENCLAW_GATEWAY_BIND=${OPENCLAW_GATEWAY_BIND:-lan}
      # - OPENCLAW_HOME=/home/dev
      - CLAUDE_AI_SESSION_KEY=${CLAUDE_AI_SESSION_KEY}
      - CLAUDE_WEB_SESSION_KEY=${CLAUDE_WEB_SESSION_KEY}
      - CLAUDE_WEB_COOKIE=${CLAUDE_WEB_COOKIE}
      - DEV_SERVER_HOST=localhost
    ports:
      - "${SSH_PORT}:22"      # VS Code Desktop — Remote-SSH
      - "${CODE_SERVER_PORT}:8080"    # iPad / Browser — code-server
      # - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"  # Openclaw gateway
      # - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"   # Openclaw bridge
    volumes:
      - ${HOST_HOME}:/home/${DEV_USER}
      - ${HOST_HOME}/.openclaw/config:/home/${DEV_USER}/.openclaw
      - ${HOST_HOME}/.openclaw/workspace:/home/${DEV_USER}/.openclaw/workspace
    restart: unless-stopped
    networks:
      - dev_net
      - caddy_net

networks:
  dev_net:
    name: dev_net
  caddy_net:
    name: caddy_net
