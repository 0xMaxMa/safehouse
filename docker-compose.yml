services:
  dev-server:
    build:
      context: ./build
      args:
        DEV_USER: ${DEV_USER}
        DEV_USER_PASSWORD: ${DEV_USER_PASSWORD}
    container_name: dev-server
    environment:
      - DEV_USER=${DEV_USER}
      - SSH_PORT=${SSH_PORT}
      - CODE_SERVER_PORT=${CODE_SERVER_PORT}
      - CODE_SERVER_PASSWORD=${DEV_USER_PASSWORD}
      # Docker CLI to the docker-builder DinD container (run ./scripts/docker-builder-start.sh first)
      - DOCKER_HOST=tcp://docker-builder:2375
    ports:
      - "${SSH_PORT}:22"      # VS Code Desktop — Remote-SSH
      - "${CODE_SERVER_PORT}:8080"    # iPad / Browser — code-server
    volumes:
      - ${HOST_HOME}/${DEV_USER}:/home/${DEV_USER}
    restart: unless-stopped
    networks:
      - devnet

  openclaw-gateway:
    image: alpine/openclaw:latest
    container_name: openclaw-gateway
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
      DEV_SERVER_HOST: dev-server
      DEV_USER: ${DEV_USER:-dev}
    volumes:
      - ${HOST_HOME}/.openclaw/config:/home/node/.openclaw
      - ${HOST_HOME}/.openclaw/workspace:/home/node/.openclaw/workspace
      - ${HOST_HOME}/${DEV_USER:-dev}/.ssh:/home/node/.ssh
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]
    networks:
      - devnet

  caddy:
    image: caddy:alpine
    container_name: caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - devnet

volumes:
  caddy_data:
  caddy_config:

networks:
  devnet:
    name: devnet
    driver: bridge
