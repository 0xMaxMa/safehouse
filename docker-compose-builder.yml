services:
  docker-builder:
    image: docker:dind
    container_name: docker-builder
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    volumes:
      - docker-builder-data:/var/lib/docker
      - ./projects:/workspace
    restart: unless-stopped
    networks:
      - dev_net

volumes:
  docker-builder-data:

networks:
  dev_net:
    name: dev_net
